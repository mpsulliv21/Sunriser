<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="../js/app.js" defer></script>
</head>

<body>
    <div class="dashboard-container">
        <h2>Your Financial Dashboard</h2>

        <div id="summary"></div>

        <a href="checkin.html" class="btn-primary">Monthly Check-In</a>
    </div>

    <script>
        auth.onAuthStateChanged(user => {
            if (!user) return window.location.href = "login.html";

            db.collection("users").doc(user.uid).get().then(doc => {
                const data = doc.data();

                const expenses = data.expenses;
                const totalExpenses = expenses.housing + expenses.transportation + expenses.food + expenses.entertainment + expenses.misc;

                const saved = data.income - totalExpenses;
                const percent = Math.round((saved / data.savingsGoal) * 100);

                document.getElementById("summary").innerHTML = `
                    <p><strong>Monthly Income:</strong> $${data.income}</p>
                    <p><strong>Total Expenses:</strong> $${totalExpenses}</p>
                    <p><strong>Saved:</strong> $${saved}</p>
                    <p><strong>Goal:</strong> $${data.savingsGoal}</p>
                    <p><strong>Progress:</strong> ${percent}% of goal</p>
                `;
            });
        });
    </script>
</body>
</html>
